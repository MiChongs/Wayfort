# Dev-environment compose. The app binary is intentionally NOT a service
# here — operators run it on the host (`go run ./cmd/jumpserver` or via
# GoLand) so iteration loops aren't gated on `docker build`. This file
# only stands up the stateful + protocol dependencies the local binary
# dials over the host-published ports.
#
# Host-side DSN for the locally-run app:
#   db.dsn: "host=127.0.0.1 user=jumpserver password=jumpserver dbname=jumpserver port=5432 sslmode=disable"
#   redis.addr: "127.0.0.1:6379"
#   protocols.guacamole.guacd_addr: "127.0.0.1:4822"
#
# For a "real" compose deploy (CI / staging / prod) the upstream
# Dockerfile in this directory still builds a release image — add an
# `app:` service block back in with `build: { context: .., dockerfile:
# deployments/Dockerfile }` and the env from the previous revision.

services:
  # Phase 14 — Postgres replaces MySQL because the credential pool now
  # stores bytea envelope blobs + KMS-wrapped DEKs, and GORM's Postgres
  # driver handles those more directly than the MySQL one. Pin to a
  # specific minor so `docker compose pull` doesn't silently upgrade
  # storage encoding behind a running cluster.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jumpserver
      POSTGRES_USER: jumpserver
      POSTGRES_PASSWORD: jumpserver
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    # Map to host port 5433 to avoid colliding with any locally-installed
    # PostgreSQL service that already owns 5432 (Windows `pgAdmin`,
    # macOS `Postgres.app`, distro `postgresql.service`). Adjust the
    # host-side port freely; container always listens on 5432.
    ports: ["5433:5432"]
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jumpserver -d jumpserver"]
      interval: 5s
      timeout: 3s
      retries: 20
    # Without a restart policy a host reboot leaves Postgres down while
    # restart:unless-stopped services (guacd/onlyoffice) come back — bring it
    # back automatically like the rest of the stateful tier.
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # The gateway cache holds operational state the janitor relies on: active
    # session tracking plus anonymous-sandbox / port-forward TTL keys
    # (internal/cache/redis.go). Losing those on restart would orphan sandbox
    # containers, so:
    #   - persist with AOF (durable, fsync every second) + an RDB safety net,
    #   - cap memory but use noeviction — never silently drop a TTL key that
    #     drives cleanup; the working set is tiny so the cap only guards the host,
    #   - data lives in the named `redis` volume below (the bare image otherwise
    #     parks /data in an anonymous volume that recreate/`down -v` can orphan).
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60 100"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "noeviction"
    ports: ["6379:6379"]
    volumes:
      - redis:/data
    healthcheck:
      # redis-cli ping reports PONG only after the AOF/RDB load completes, so the
      # start_period grace stops a slow first load from flapping the healthcheck.
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    # Give Redis time to flush its final RDB/AOF on shutdown instead of the 10s
    # default SIGKILL window.
    stop_grace_period: 30s
    restart: unless-stopped

  # Test SSH target. testuser / testpass.
  sshd-target:
    image: linuxserver/openssh-server:latest
    environment:
      USER_NAME: testuser
      USER_PASSWORD: testpass
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "false"
    ports: ["2222:2222"]

  # Apache Guacamole protocol daemon for RDP/VNC bridging.
  # Mount the sessions volume so guacd can drop recording files at the
  # same path the host-side app sees. The volume is bind-mounted into
  # the host process via the `storage.sessions_dir` config knob.
  guacd:
    image: guacamole/guacd:1.5.5
    ports: ["4822:4822"]
    volumes:
      - sessions:/var/lib/jumpserver/sessions
    restart: unless-stopped

  # OnlyOffice Document Server — backs the in-browser Office editor used by the
  # SFTP / OSS file viewers. The single image bundles its own Postgres / Redis /
  # RabbitMQ, so no extra services are required. JWT signing is on; JWT_SECRET
  # MUST match `office.jwt_secret` in the gateway config. extra_hosts lets the
  # container reach the host-run gateway at host.docker.internal for the save
  # callback (Docker Desktop provides this automatically; the explicit mapping
  # makes it work on Linux engines too). First boot takes ~30–60s — wait for the
  # healthcheck before opening a document.
  onlyoffice:
    image: onlyoffice/documentserver:8.2
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: "jumpserver-onlyoffice-secret-change-me"
      JWT_HEADER: "Authorization"
      JWT_IN_BODY: "true"
    # Host 18082 → container 80. 8082 falls inside a Windows reserved/excluded
    # TCP range (Hyper-V/WSL dynamic ports, e.g. 7999–8098), where Docker fails
    # to bind with "An attempt was made to access a socket in a way forbidden by
    # its access permissions." 18082 mirrors the gateway's 18080 escape hatch.
    # Keep `office.document_server_url` in the gateway config on the same port.
    ports: ["18082:80"]
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
      - onlyoffice_cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files
      - onlyoffice_db:/var/lib/postgresql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/healthcheck || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres: {}
  redis: {}
  sessions: {}
  onlyoffice_data: {}
  onlyoffice_log: {}
  onlyoffice_cache: {}
  onlyoffice_db: {}
