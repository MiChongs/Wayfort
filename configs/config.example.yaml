server:
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s

db:
  # Phase 14: PostgreSQL DSN. Switched from MySQL because the
  # credential pool now relies on bytea + KMS envelope semantics
  # that GORM's Postgres driver handles more directly than its
  # MySQL one (varbinary length ceilings interact poorly with
  # rewrapped DEK blobs of varying length).
  #
  # Format: host=... user=... password=... dbname=... port=... sslmode=...
  dsn: "host=127.0.0.1 user=jumpserver password=jumpserver dbname=jumpserver port=5432 sslmode=disable"
  max_open: 50
  max_idle: 10
  conn_max_lifetime: 1h

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

auth:
  jwt_secret: "change-me-to-a-secret-at-least-32-bytes-long"
  access_ttl: 1h
  refresh_ttl: 168h
  bootstrap_admin: "admin"
  # 留空或填 "admin" 都会被视作未设置，首次启动时由系统生成 20 位强随机密码并
  # 在控制台 banner 输出（只显示一次）。若填了 12 位以上的自定义密码，则原样使用。
  bootstrap_password: ""
  lockout:
    enabled: true
    threshold: 5
    window: 15m
    duration: 15m
  mfa:
    enforce_for_admin: false
    totp_issuer: "JumpServer"
    email_otp_ttl: 5m
    email_otp_cooldown: 60s
    recovery_codes_count: 10
  passkey:
    enabled: false
    rp_id: "localhost"
    rp_display: "JumpServer"
    rp_origins: ["http://localhost:8080"]
    discoverable_login: true
  anomaly:
    enabled: true
    notify_email: false

ai:
  enabled: true
  default_permission_mode: normal   # plan / normal / bypass
  max_iterations: 20
  max_subagent_depth: 2
  tool_timeout: 60s
  approval_timeout: 2m
  conversation_ttl_days: 90
  # 首次启动时种入默认全局 Agent（sre-copilot / health-inspector /
  # log-analyst / security-auditor / incident-responder / cost-optimizer
  # + 三个 sub-agent：db-doctor / k8s-pilot / network-engineer）。
  # 同名 Agent 已存在时不会覆盖，安全打开。
  seed_default_agents: true
  # ssh_exec_readonly_allow: 允许的只读命令。
  # - 不带空格的条 = "binary-only"：命令首个 token 完全匹配即放行
  #   （e.g. "ss" 放行所有 ss xxx 子命令）
  # - 带空格的条 = "前缀匹配"：必须以"该前缀+空格"开头（e.g. "systemctl status"
  #   放行 systemctl status nginx，但不放行 systemctl restart nginx）
  # 自动按 | 和 && 拆段，每段独立判定；含 $()、反引号、; 、>、<、单独 &
  # 一律拒绝（用 ssh_exec 走人工确认）。
  # 缺省值（不配置或为空）使用代码内 DefaultReadonlyAllow（~140 条，覆盖
  # 文本读取 / 系统信息 / 进程 / 网络 / 容器 / k8s / systemd / 包查询 /
  # HTTP HEAD/GET / git 只读 等）。
  # 留空 / 删除此键 = 用代码内 DefaultReadonlyAllow（~150 条）；非空 = 完全替换默认。
  ssh_exec_readonly_allow: []
  # 在默认（或替换后的）基础上 **追加** 自定义白名单条目（不替换）。
  # 适合"只想加几个本地工具"的场景，避免抄 150 行默认。
  # 同样支持 binary-only（无空格）+ prefix（含空格）两种条目。
  # 示例：开放公司内部 CLI、加几个 nodejs 工具等。
  ssh_exec_readonly_allow_extra: []

notify:
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
    from: "JumpServer <noreply@example.com>"
    tls: "starttls"
  worker:
    chan_size: 256
    max_retries: 3

crypto:
  # ----- Phase 14: KMS-managed envelope encryption -----
  #
  # Credentials in the pool are now wrapped with envelope encryption:
  # a fresh per-row DEK + a KEK held in an external KMS (Vault /
  # OpenBao Transit, or AWS / Azure / GCP KMS). All KMS provider
  # configuration lives in the `kms_providers` DB table — NOT in this
  # YAML and NOT in environment variables.
  #
  # The bootstrap unseal passphrase lives in a single 0600 file under
  # `unseal_passphrase_file`. If the file does not exist on first
  # boot we mint a fresh 32-byte hex passphrase, write it 0600, and
  # log a one-line warning. Operators are expected to:
  #
  #   1. Take a backup of `./var/keystore.unseal` out-of-band.
  #   2. Visit /api/v1/setup/kms to register a real KMS provider
  #      (Vault / AWS KMS / Azure Key Vault / GCP Cloud KMS).
  #   3. Promote it primary; the rewrap job migrates existing
  #      envelopes off the default-local provider.
  unseal_passphrase_file: "./var/keystore.unseal"
  #
  # master_key_hex is the LEGACY pre-Phase-14 fixed AES-256 key.
  # New installs leave it empty. Existing deployments with rows
  # encrypted under the old Sealer keep it set during the one-shot
  # migration window so the envelope vault can fall through to the
  # legacy reader; remove it once every legacy row has been rewrapped.
  master_key_hex: ""

storage:
  sessions_dir: "./var/sessions"

sshpool:
  max_sessions_per_client: 8
  idle_eviction: 10m
  dial_timeout: 15s
  keepalive: 30s

anonymous:
  enabled: true
  image: "alpine:latest"
  ttl: 10m
  cpu: 0.5
  memory_mb: 128
  pids_limit: 64
  network: "none"
  shell: ["/bin/sh"]

recorder:
  chan_size: 1024
  flush_interval: 250ms

audit:
  chan_size: 4096
  batch_size: 64
  batch_interval: 200ms

webssh:
  read_buffer: 8192
  write_timeout: 10s
  ping_interval: 30s

# Live system telemetry shown on the SSH page (CPU / memory / disks /
# processes / network). The frontend polls these endpoints on a user-chosen
# interval; the gateway dedups concurrent polls within `cache_ttl`.
insights:
  enabled: true
  cache_ttl: 3s
  ssh_timeout: 10s
  process_limit: 200

# Plan 17 — new RDP backend. Replaces guacd for /nodes/[id]/rdp-next pages.
# Old /nodes/[id]/rdp keeps using guacd (Plan 16) until M2 reaches parity.
#
# Backends:
#   - "dummy"   : in-process test-pattern worker, no external deps.
#                 Use for development / smoke / CI. Default in M1.
#   - "freerdp" : spawn `freerdp-worker` subprocess linked to libfreerdp 3.x.
#                 Requires libfreerdp3 + libfreerdp-client3 + libwinpr3 at
#                 runtime. Switch to this once you've built the worker
#                 from cmd/freerdp-worker on a libfreerdp-equipped host.
desktop:
  enabled: true
  default_backend: ironrdp
  max_concurrent_sessions: 64

  # Session recording + input audit (freerdp backend). Frames are taped to a
  # .dtr file the browser replays in-place with an input/event audit timeline.
  recording:
    enabled: true
    dir: "" # empty => <storage.sessions_dir>/desktop-recordings
    include_input: true # record keyboard/mouse/clipboard into the audit timeline

  # ----- Per-user file drive (freerdp backend only) -----
  # A persistent personal folder redirected into every RDP session as a mounted
  # drive. The user uploads/downloads via the browser file panel; the same
  # folder is the drive they see under "This PC" in the remote desktop, so files
  # move both ways. ironrdp sessions don't get it.
  drive:
    enabled: true
    dir: "" # empty => <storage.sessions_dir>/desktop-drives ; per-user under user-<id>
    name: "JumpServer" # share label shown in the remote "This PC" (ASCII)
    allow_upload: true # local -> remote
    allow_download: true # remote -> local (set false to block exfiltration)
    max_file_mb: 1024 # per-file cap, 0 = unlimited
    max_total_mb: 4096 # per-user folder cap, 0 = unlimited

  # ----- WebRTC video path (freerdp backend only) -----
  # Streams the desktop as a hardware-decoded VP8 video track instead of the
  # legacy dirty-bitmap frames the browser decodes in JS. The worker encodes the
  # composited framebuffer with libvpx; the gateway relays it over a Pion video
  # track; the browser plays it in a <video> element. Falls back to the bitmap
  # path automatically when the browser lacks WebRTC or negotiation fails.
  webrtc:
    enabled: true
    # Preferred codec: "vp9" (default) uses VP9 screen-content coding — much
    # sharper for desktop text/UI at the same bitrate — when the browser can
    # decode it; falls back to "vp8" per-session otherwise. Set "vp8" to force
    # the universal baseline. Users can also force WebRTC vs JS per-session in
    # the desktop settings sheet (传输方式), and pick a quality tier (画质).
    codec: vp9
    bitrate_kbps: 8000 # "balanced" target bitrate; the quality tier scales it (0 => 8000)
    fps: 30 # capture/encode frame rate, 0 => worker default (30)
    # ICE: host candidates only by default (works when the gateway is directly
    # reachable from the browser / same LAN). Add STUN/TURN/public_ip for NAT.
    stun_urls: [] # e.g. ["stun:stun.l.google.com:19302"]
    turn_url: "" # e.g. "turn:turn.example.com:3478"
    turn_username: ""
    turn_password: ""
    public_ip: "" # 1:1 NAT: map host candidates to the gateway's public IP
    udp_port_min: 0 # narrow the ICE UDP range for a tight firewall (0/0 = any)
    udp_port_max: 0

  # ----- Plan 29: IronRDP path (Devolutions Gateway subprocess) -----
  devolutions_gateway:
    # The supervisor is on by default since default_backend is ironrdp.
    # Turn off if you want to stay on the legacy freerdp worker — then
    # also set `default_backend: freerdp` and configure worker_path
    # below.
    enabled: true
    # When true (default) and the gateway binary is missing, the install
    # script under scripts/install-devolutions-gateway-*.{sh,ps1} runs
    # at startup to download it from upstream.
    auto_install: true
    # When true (default) the gateway subprocess is spawned and
    # supervised by jumpserver. Disable if you run the gateway under
    # systemd / Windows service / Docker — then jumpserver only writes
    # the JSON config + mints JWTs.
    auto_start: true
    # Install / config / key locations. Empty entries pick platform
    # defaults relative to install_prefix.
    install_prefix: ""               # e.g. /opt/jumpserver/devolutions-gateway
    binary_path: ""                  # <install_prefix>/devolutions-gateway[.exe]
    config_path: ""                  # <install_prefix>/config/gateway.json
    id_file: ""                      # <install_prefix>/config/gateway-id
    jwt_private_key_file: ""         # <install_prefix>/config/jwt.key (auto-generated 2048-bit RSA on first run)
    # Internal listener for the gateway. The browser does NOT hit this
    # directly unless advertised_url is empty — typically you'd put
    # nginx / Caddy in front and have it forward `/jet/*` here.
    listen_addr: "http://127.0.0.1:7171"
    # WebSocket URL handed to the browser inside the start-session
    # response. Empty → derive from listen_addr.
    advertised_url: ""
    # RS256 JWT TTL. 90s is enough for one WebSocket connect; expired
    # tokens force the browser to re-issue start-session.
    token_ttl: 90s
    # How long Ensure() waits for /jet/health to return 200 OK.
    health_timeout: 15s
    # Pass-through to the gateway's `Verbosity` config (warn/info/debug).
    verbosity: info

protocols:
  guacamole:
    enabled: false
    guacd_addr: "127.0.0.1:4822"
    recording: true
    socks_listen_host: "127.0.0.1"
    # When guacd runs in a separate container that mounts the sessions volume
    # at a different path, override here. Empty => use storage.sessions_dir.
    recording_path_in_guacd: ""
  dbcli:
    enabled: false
    images:
      mysql:    "mysql:8.0"
      postgres: "postgres:16-alpine"
      redis:    "redis:7-alpine"
      mongo:    "mongo:7"
    ttl: 30m
  tcpfwd:
    enabled: true
    listen_host: "127.0.0.1"
    port_range: [40000, 49999]
    default_ttl: 1h
    max_per_user: 8
  telnet:
    enabled: true
    timeout: 15s

# Online Office (OnlyOffice / Collabora) — in-browser editing of Office
# documents on the SFTP and OSS surfaces. Disabled by default; when off, office
# files fall back to download.
#
# The bundled deployments/docker-compose.yaml ships an `onlyoffice` service and
# the values below already line up with it — bring the stack up and set enabled
# to true. document_server_url is the host-published port the browser loads the
# editor from; callback_base_url is how the container reaches the host-run
# gateway (:8080) to pull files and post saves; jwt_secret MUST match the
# compose JWT_SECRET. CHANGE jwt_secret before any non-local deployment.
office:
  enabled: false
  document_server_url: "http://127.0.0.1:18082/"
  jwt_secret: "jumpserver-onlyoffice-secret-change-me"
  callback_base_url: "http://host.docker.internal:8080"
