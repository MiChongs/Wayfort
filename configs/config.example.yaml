server:
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s

db:
  dsn: "jumpserver:jumpserver@tcp(127.0.0.1:3306)/jumpserver?charset=utf8mb4&parseTime=True&loc=Local"
  max_open: 50
  max_idle: 10
  conn_max_lifetime: 1h

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

auth:
  jwt_secret: "change-me-to-a-secret-at-least-32-bytes-long"
  access_ttl: 1h
  refresh_ttl: 168h
  bootstrap_admin: "admin"
  # 留空或填 "admin" 都会被视作未设置，首次启动时由系统生成 20 位强随机密码并
  # 在控制台 banner 输出（只显示一次）。若填了 12 位以上的自定义密码，则原样使用。
  bootstrap_password: ""
  lockout:
    enabled: true
    threshold: 5
    window: 15m
    duration: 15m
  mfa:
    enforce_for_admin: false
    totp_issuer: "JumpServer"
    email_otp_ttl: 5m
    email_otp_cooldown: 60s
    recovery_codes_count: 10
  passkey:
    enabled: false
    rp_id: "localhost"
    rp_display: "JumpServer"
    rp_origins: ["http://localhost:8080"]
    discoverable_login: true
  anomaly:
    enabled: true
    notify_email: false

ai:
  enabled: true
  default_permission_mode: normal   # plan / normal / bypass
  max_iterations: 20
  max_subagent_depth: 2
  tool_timeout: 60s
  approval_timeout: 2m
  conversation_ttl_days: 90
  # 首次启动时种入默认全局 Agent（sre-copilot / health-inspector /
  # log-analyst / security-auditor / incident-responder / cost-optimizer
  # + 三个 sub-agent：db-doctor / k8s-pilot / network-engineer）。
  # 同名 Agent 已存在时不会覆盖，安全打开。
  seed_default_agents: true
  # ssh_exec_readonly_allow: 允许的只读命令。
  # - 不带空格的条 = "binary-only"：命令首个 token 完全匹配即放行
  #   （e.g. "ss" 放行所有 ss xxx 子命令）
  # - 带空格的条 = "前缀匹配"：必须以"该前缀+空格"开头（e.g. "systemctl status"
  #   放行 systemctl status nginx，但不放行 systemctl restart nginx）
  # 自动按 | 和 && 拆段，每段独立判定；含 $()、反引号、; 、>、<、单独 &
  # 一律拒绝（用 ssh_exec 走人工确认）。
  # 缺省值（不配置或为空）使用代码内 DefaultReadonlyAllow（~140 条，覆盖
  # 文本读取 / 系统信息 / 进程 / 网络 / 容器 / k8s / systemd / 包查询 /
  # HTTP HEAD/GET / git 只读 等）。
  # 留空 / 删除此键 = 用代码内 DefaultReadonlyAllow（~150 条）；非空 = 完全替换默认。
  ssh_exec_readonly_allow: []
  # 在默认（或替换后的）基础上 **追加** 自定义白名单条目（不替换）。
  # 适合"只想加几个本地工具"的场景，避免抄 150 行默认。
  # 同样支持 binary-only（无空格）+ prefix（含空格）两种条目。
  # 示例：开放公司内部 CLI、加几个 nodejs 工具等。
  ssh_exec_readonly_allow_extra: []

notify:
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
    from: "JumpServer <noreply@example.com>"
    tls: "starttls"
  worker:
    chan_size: 256
    max_retries: 3

crypto:
  master_key_hex: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

storage:
  sessions_dir: "./var/sessions"

sshpool:
  max_sessions_per_client: 8
  idle_eviction: 10m
  dial_timeout: 15s
  keepalive: 30s

anonymous:
  enabled: true
  image: "alpine:latest"
  ttl: 10m
  cpu: 0.5
  memory_mb: 128
  pids_limit: 64
  network: "none"
  shell: ["/bin/sh"]

recorder:
  chan_size: 1024
  flush_interval: 250ms

audit:
  chan_size: 4096
  batch_size: 64
  batch_interval: 200ms

webssh:
  read_buffer: 8192
  write_timeout: 10s
  ping_interval: 30s

# Live system telemetry shown on the SSH page (CPU / memory / disks /
# processes / network). The frontend polls these endpoints on a user-chosen
# interval; the gateway dedups concurrent polls within `cache_ttl`.
insights:
  enabled: true
  cache_ttl: 3s
  ssh_timeout: 10s
  process_limit: 200

# =============================================================================
# Desktop subsystem (RDP/VNC viewers reached from the workspace)
# =============================================================================
# Powers `/nodes/[id]/rdp-next` pages and the workspace "rdp_next" tab type.
# `/nodes/[id]/rdp` keeps using guacd (Plan 16) and is unaffected by anything
# below.
#
# Backend matrix:
#
#   ironrdp (default, Plan 29) ────────────────────────────────────────────────
#     The browser runs Devolutions IronRDP (Rust → Wasm) and opens a
#     WebSocket directly to a Devolutions Gateway subprocess we supervise.
#     Our Go service only signs short-lived RS256 JWTs. Native RDP 10.x
#     support, no cgo / libfreerdp / MSYS2 toolchain required on the host.
#     Upstream: https://github.com/Devolutions/IronRDP
#                https://github.com/Devolutions/devolutions-gateway
#
#   freerdp (legacy, Plan 17–28) ──────────────────────────────────────────────
#     `freerdp-worker` subprocess linked against libfreerdp 3.x speaks RDP
#     and ships frames over our in-house WS protocol. Kept available for
#     hosts that already have the worker installed or for environments
#     where IronRDP isn't appropriate. Pre-build with scripts/build-worker-*.
#
#   dummy ─────────────────────────────────────────────────────────────────────
#     In-process test-pattern worker, no external deps. CI / development.
#
# Selection precedence (lowest → highest): default_backend → request body
# `backend` field. The workspace tab type "rdp_next" passes the default
# through; per-session overrides come from explicit API calls.
desktop:
  enabled: true
  default_backend: ironrdp
  max_concurrent_sessions: 64

  # debug_log only affects the legacy "freerdp" backend (injects
  # WLOG_LEVEL=DEBUG into the worker subprocess env). The ironrdp path's
  # logging is controlled by devolutions_gateway.verbosity below.
  debug_log: false

  # ---------------------------------------------------------------------------
  # ironrdp backend — Devolutions Gateway subprocess supervisor (default)
  # ---------------------------------------------------------------------------
  # Defaults assume single-host: gateway binary lives next to jumpserver,
  # listens on loopback, our reverse proxy (or nothing, on dev) forwards
  # browser WebSocket traffic to it. Multi-host / containerised setups
  # override individual fields below — see "deployment scenarios" at the
  # end of this section.
  devolutions_gateway:
    # Master switch for the ironrdp path. Default true since
    # default_backend = ironrdp; set false here AND switch default_backend
    # back to "freerdp" if you want to stay on the legacy stack.
    enabled: true

    # On startup, if `binary_path` doesn't exist on disk, run
    # scripts/install-devolutions-gateway-{linux,darwin,windows}.{sh,ps1}
    # which fetches the latest release from
    # https://github.com/Devolutions/devolutions-gateway/releases and drops
    # the binary into `install_prefix`. Pin a version with the DGW_VERSION
    # env var; point at an internal mirror with DGW_MIRROR.
    auto_install: true

    # When true (default) the gateway subprocess is spawned and supervised
    # by jumpserver — crash-restart with bounded backoff, health probe on
    # /jet/health, lifecycle bound to ours. Disable if you run the gateway
    # under systemd / Windows service / Docker — then jumpserver only
    # generates the JSON config and mints JWTs.
    auto_start: true

    # ----- Filesystem layout -----
    # Empty paths derive from `install_prefix` + platform conventions:
    #   Linux           — /opt/jumpserver/devolutions-gateway
    #   macOS           — ~/Library/Application Support/JumpServer/devolutions-gateway
    #   Windows         — %LOCALAPPDATA%\Programs\JumpServer\devolutions-gateway
    # `install_prefix` is also where the install script drops the binary.
    install_prefix: ""
    binary_path: ""                  # default: <install_prefix>/devolutions-gateway[.exe]
    config_path: ""                  # default: <install_prefix>/config/gateway.json (regenerated each start)
    id_file: ""                      # default: <install_prefix>/config/gateway-id  (UUIDv4, persists across restarts)
    jwt_private_key_file: ""         # default: <install_prefix>/config/jwt.key      (2048-bit RSA, auto-generated on first run; <path>.pub is written too)

    # ----- Networking -----
    # listen_addr is what the gateway subprocess binds. Internal-only —
    # we typically put nginx/Caddy in front to terminate TLS and forward
    # /jet/* to this address. For dev you can hit it directly.
    listen_addr: "http://127.0.0.1:7171"
    # advertised_url is the WebSocket URL handed to the browser inside the
    # /api/v1/desktop/sessions response. Use wss:// once a reverse proxy
    # is in front. Empty = derive from listen_addr (good for dev only).
    # Example for production:
    #   advertised_url: "wss://jumpserver.example.com/jet/rdp"
    advertised_url: ""

    # ----- JWT signing -----
    # token_ttl caps how long one minted JWT stays valid. 90s is enough
    # for the browser to open one WebSocket; tokens are single-use in
    # practice because the Devolutions Gateway invalidates them after
    # the upgrade handshake. Keep short to limit blast radius if leaked.
    token_ttl: 90s

    # ----- Health probing -----
    # On startup the supervisor waits up to health_timeout for the gateway
    # to respond 200 OK on /jet/health before considering it Ready. Bump
    # on slow disks or when the binary itself takes long to start.
    health_timeout: 15s

    # ----- Gateway logging -----
    # Verbosity is passed straight through to the Devolutions Gateway's
    # config and routed to its own log appender. Values: error / warn /
    # info (default) / debug / trace. Use "debug" only while triaging
    # connection issues — trace dumps every PDU.
    verbosity: info

  # ---------------------------------------------------------------------------
  # Legacy freerdp worker (kept as opt-in fallback; default OFF)
  # ---------------------------------------------------------------------------
  # If you flip default_backend back to "freerdp" or pass backend="freerdp"
  # in a session start request, the gateway expects a worker binary at one
  # of:
  #   - worker_path (if set)
  #   - /usr/local/bin/freerdp-worker (Linux)
  #   - /opt/homebrew/bin/freerdp-worker (macOS Apple Si)
  #   - /usr/local/bin/freerdp-worker (macOS Intel)
  #   - %ProgramFiles%\JumpServer\freerdp-worker.exe (Windows)
  # Build via scripts/build-worker-{linux,darwin,windows}.{sh,sh,ps1}.
  # Requires libfreerdp 3.x + cgo toolchain at build time.
  worker_path: ""
  worker_idle_timeout: 5m
  # Runtime auto-install of the legacy worker was removed in favour of
  # explicit pre-build scripts. Field kept here for yaml back-compat —
  # the gateway logs a deprecation notice if you set it true and ignores.
  auto_install: false
  install_prefix: ""

  # ---------------------------------------------------------------------------
  # Deployment scenarios (commented-out templates)
  # ---------------------------------------------------------------------------
  #
  # ────────────────────────────────────────────────────────────────────────
  # 1) Single-host with auto-everything (zero-config; the default above
  #    already reflects this). Browser hits gateway over loopback in dev,
  #    via reverse proxy in prod.
  # ────────────────────────────────────────────────────────────────────────
  #
  # ────────────────────────────────────────────────────────────────────────
  # 2) Reverse-proxy fronting (recommended for production)
  # ────────────────────────────────────────────────────────────────────────
  #   devolutions_gateway:
  #     enabled: true
  #     auto_install: true
  #     auto_start: true
  #     listen_addr: "http://127.0.0.1:7171"
  #     advertised_url: "wss://jumpserver.example.com/jet/rdp"
  #     # nginx snippet:
  #     #   location /jet/ {
  #     #     proxy_pass http://127.0.0.1:7171;
  #     #     proxy_http_version 1.1;
  #     #     proxy_set_header Upgrade $http_upgrade;
  #     #     proxy_set_header Connection "upgrade";
  #     #     proxy_set_header Host $host;
  #     #     proxy_read_timeout 86400s;
  #     #   }
  #
  # ────────────────────────────────────────────────────────────────────────
  # 3) Gateway runs under systemd / Windows service / Docker, separate
  #    from jumpserver
  # ────────────────────────────────────────────────────────────────────────
  #   devolutions_gateway:
  #     enabled: true
  #     auto_install: false              # operator manages binary install
  #     auto_start: false                # operator runs the binary
  #     # jumpserver still writes config_path + jwt.key.pub so the gateway
  #     # picks up keys + listener layout.
  #     binary_path: "/usr/local/bin/devolutions-gateway"
  #     config_path: "/etc/devolutions-gateway/gateway.json"
  #     jwt_private_key_file: "/etc/devolutions-gateway/jwt.key"
  #     listen_addr: "http://devolutions-gateway:7171"
  #     advertised_url: "wss://jumpserver.example.com/jet/rdp"
  #
  # ────────────────────────────────────────────────────────────────────────
  # 4) Stay on legacy freerdp worker (no Devolutions Gateway at all)
  # ────────────────────────────────────────────────────────────────────────
  #   default_backend: freerdp
  #   debug_log: false
  #   devolutions_gateway:
  #     enabled: false
  #     auto_start: false
  #     auto_install: false
  #   worker_path: "/usr/local/bin/freerdp-worker"   # built from cmd/freerdp-worker
  #
  # ────────────────────────────────────────────────────────────────────────
  # 5) China / behind-firewall: pin version and use internal mirror
  # ────────────────────────────────────────────────────────────────────────
  #   Set env vars BEFORE starting jumpserver (the install script reads them):
  #     DGW_VERSION=2026.1.2
  #     DGW_MIRROR=https://internal.mirror.example.com/devolutions-gateway/releases/download

protocols:
  guacamole:
    enabled: false
    guacd_addr: "127.0.0.1:4822"
    recording: true
    socks_listen_host: "127.0.0.1"
    # When guacd runs in a separate container that mounts the sessions volume
    # at a different path, override here. Empty => use storage.sessions_dir.
    recording_path_in_guacd: ""
  dbcli:
    enabled: false
    images:
      mysql:    "mysql:8.0"
      postgres: "postgres:16-alpine"
      redis:    "redis:7-alpine"
      mongo:    "mongo:7"
    ttl: 30m
  tcpfwd:
    enabled: true
    listen_host: "127.0.0.1"
    port_range: [40000, 49999]
    default_ttl: 1h
    max_per_user: 8
  telnet:
    enabled: true
    timeout: 15s
